<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Felipe.dev</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .admin {
            padding-top: 8rem;
            min-height: 100vh;
        }

        .admin__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--mb-3);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .admin__card {
            background-color: var(--container-color);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .admin__form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .form__group {
            display: grid;
            gap: 0.5rem;
        }

        .form__group.full-width {
            grid-column: 1 / -1;
        }

        .form__label {
            font-size: var(--small-font-size);
            font-weight: var(--font-medium);
            color: var(--title-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form__input {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-family: var(--body-font);
            font-size: var(--normal-font-size);
            transition: border-color 0.3s;
        }

        .form__input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .admin__actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            grid-column: 1 / -1;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--container-color);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success i {
            color: #10b981;
        }

        .toast.error i {
            color: #ef4444;
        }

        .section-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .section-nav__btn {
            background: none;
            border: none;
            color: var(--text-color-light);
            cursor: pointer;
            padding: 0.5rem 1rem;
            font-weight: var(--font-medium);
            transition: color 0.3s;
        }

        .section-nav__btn.active {
            color: var(--primary-color);
            position: relative;
        }

        .section-nav__btn.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
        }

        .admin__section {
            display: none;
        }

        .admin__section.active {
            display: block;
        }

        .items-list {
            display: grid;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .item-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info h4 {
            color: var(--title-color);
            margin-bottom: 0.25rem;
        }

        .item-info p {
            font-size: var(--small-font-size);
            color: var(--text-color-light);
        }

        .item-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-color-light);
            cursor: pointer;
            font-size: 1.25rem;
            transition: color 0.3s;
        }

        .btn-icon:hover {
            color: var(--primary-color);
        }

        .btn-icon--delete:hover {
            color: #ef4444;
        }

        @media screen and (max-width: 768px) {
            .admin__form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body style="display: none;"> <!-- Hidden until auth is checked -->
    <!-- Background Elements -->
    <div class="glow glow-1"></div>

    <main class="main">
        <section class="admin section">
            <div class="container">
                <div class="admin__header">
                    <div>
                        <h1 class="section__title" style="margin-bottom: 0.5rem; transform: none; left: 0;">Painel
                            Administrativo</h1>
                        <p>Gerencie as informações de contato do seu portfólio.</p>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <a href="index.html" class="button button--nav" target="_blank">Ver Site <i
                                class="ph ph-arrow-square-out"></i></a>
                        <button id="logout-btn" class="button button--nav"
                            style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3);">Sair <i
                                class="ph ph-sign-out"></i></button>
                    </div>
                </div>

                <div class="section-nav">
                    <button class="section-nav__btn active" data-target="settings">Configurações</button>
                    <button class="section-nav__btn" data-target="projects">Projetos</button>
                    <button class="section-nav__btn" data-target="skills">Habilidades</button>
                </div>

                <div id="settings-section" class="admin__section active">
                    <div class="admin__card">
                        <form id="settings-form" class="admin__form">
                            <!-- ... campos existentes ... -->
                            <div class="form__group">
                                <label for="email" class="form__label"><i class="ph ph-envelope-simple"></i> E-mail de
                                    Contato</label>
                                <input type="email" id="email" class="form__input" placeholder="exemplo@email.com">
                            </div>
                            <div class="form__group">
                                <label for="phone" class="form__label"><i class="ph ph-whatsapp-logo"></i> Telefone /
                                    WhatsApp</label>
                                <input type="text" id="phone" class="form__input" placeholder="+55 (11) 99999-9999">
                            </div>
                            <div class="form__group">
                                <label for="github" class="form__label"><i class="ph ph-github-logo"></i> Link do
                                    GitHub</label>
                                <input type="url" id="github" class="form__input"
                                    placeholder="https://github.com/seu-usuario">
                            </div>
                            <div class="form__group">
                                <label for="linkedin" class="form__label"><i class="ph ph-linkedin-logo"></i> Link do
                                    LinkedIn</label>
                                <input type="url" id="linkedin" class="form__input"
                                    placeholder="https://linkedin.com/in/seu-usuario">
                            </div>
                            <div class="form__group full-width">
                                <label for="resume" class="form__label"><i class="ph ph-file-pdf"></i> Currículo (.pdf)</label>
                                <div style="display: flex; gap: 1rem; align-items: center;">
                                    <input type="url" id="resume" class="form__input" placeholder="URL do arquivo ou faça upload ao lado" style="flex: 1;">
                                    <input type="file" id="resume-file" class="input-file-hidden" accept=".pdf">
                                    <button type="button" id="upload-resume-btn" class="button button--small button--ghost">
                                        <i class="ph ph-upload-simple"></i> Upload
                                    </button>
                                </div>
                            </div>
                            <div class="admin__actions">
                                <button type="submit" class="button button--primary" id="save-settings-btn">
                                    Salvar Alterações <i class="ph ph-floppy-disk"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div id="projects-section" class="admin__section">
                    <div class="admin__card">
                        <h2 style="margin-bottom: 1.5rem;">Gerenciar Projetos</h2>
                        <form id="project-form" class="admin__form">
                            <input type="hidden" id="project-id">
                            <div class="form__group">
                                <label for="project-title" class="form__label">Título do Projeto</label>
                                <input type="text" id="project-title" class="form__input" required>
                            </div>
                            <div class="form__group">
                                <label for="project-subtitle" class="form__label">Subtítulo (Ex: E-commerce)</label>
                                <input type="text" id="project-subtitle" class="form__input">
                            </div>
                            <div class="form__group full-width">
                                <label for="project-desc" class="form__label">Descrição</label>
                                <textarea id="project-desc" class="form__input"
                                    style="min-height: 100px; resize: vertical;"></textarea>
                            </div>
                            <div class="form__group">
                                <label for="project-tags" class="form__label">Tags (Separadas por vírgula)</label>
                                <input type="text" id="project-tags" class="form__input" placeholder="React, Node.js">
                            </div>
                            <div class="form__group">
                                <label for="project-link" class="form__label">Link do Projeto / Demo</label>
                                <input type="url" id="project-link" class="form__input">
                            </div>
                            <div class="form__group">
                                <label class="form__label">Imagem do Projeto</label>
                                <div style="display: flex; gap: 1rem; align-items: center;">
                                    <input type="file" id="project-image-file" class="input-file-hidden" accept="image/*">
                                    <button type="button" id="upload-project-image-btn" class="button button--small button--ghost">
                                        <i class="ph ph-image"></i> Selecionar Imagem
                                    </button>
                                    <!-- Hide the original URL input, keep it to store the final link -->
                                    <input type="hidden" id="project-image">
                                </div>
                                <div id="project-image-preview"
                                    style="margin-top: 1rem; max-width: 200px; display: none;">
                                    <img src="" alt="Preview"
                                        style="border-radius: 8px; border: 1px solid var(--border-color);">
                                </div>
                            </div>
                            <div class="admin__actions">
                                <button type="button" id="cancel-project-btn" class="button button--nav"
                                    style="display: none;">Cancelar</button>
                                <button type="submit" class="button button--primary" id="save-project-btn">Adicionar
                                    Projeto <i class="ph ph-plus"></i></button>
                            </div>
                        </form>

                        <div id="projects-list" class="items-list">
                            <!-- JS will load projects here -->
                        </div>
                    </div>
                </div>

                <div id="skills-section" class="admin__section">
                    <div class="admin__card">
                        <h2 style="margin-bottom: 1.5rem;">Gerenciar Habilidades</h2>
                        <form id="skill-form" class="admin__form">
                            <input type="hidden" id="skill-id">
                            <div class="form__group">
                                <label for="skill-name" class="form__label">Nome da Habilidade</label>
                                <input type="text" id="skill-name" class="form__input" required>
                            </div>
                            <div class="form__group">
                                <label for="skill-category" class="form__label">Categoria</label>
                                <select id="skill-category" class="form__input">
                                    <option value="Frontend">Frontend</option>
                                    <option value="Backend">Backend & Ferramentas</option>
                                </select>
                            </div>
                            <div class="form__group">
                                <label for="skill-icon" class="form__label">Ícone Phosphor (Ex: ph-atom)</label>
                                <input type="text" id="skill-icon" class="form__input" placeholder="ph-atom">
                            </div>
                            <div class="admin__actions">
                                <button type="button" id="cancel-skill-btn" class="button button--nav"
                                    style="display: none;">Cancelar</button>
                                <button type="submit" class="button button--primary" id="save-skill-btn">Adicionar
                                    Habilidade <i class="ph ph-plus"></i></button>
                            </div>
                        </form>

                        <div id="skills-list" class="items-list">
                            <!-- JS will load skills here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="ph ph-check-circle" style="font-size: 1.5rem;"></i>
        <span>Alterações salvas com sucesso!</span>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase-client.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>

</html>
